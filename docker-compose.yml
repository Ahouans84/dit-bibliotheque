services:
  postgres:
    image: postgres:16
    container_name: dit_bibliotheque_db
    environment:
      POSTGRES_USER: dit_user
      POSTGRES_PASSWORD: dit_password
      POSTGRES_DB: dit_bibliotheque
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - dit_network
    profiles:
      - dev
      - prod

  api-gateway:
    build: ./backend/api-gateway
    container_name: api_gateway
    ports:
      - "3000:3000"
    depends_on:
      - books-service
      - users-service
      - loans-service
      - recommendation-service
    networks:
      - dit_network
    profiles:
      - dev
      - prod

  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - "8080:80"
    depends_on:
      - api-gateway
    networks:
      - dit_network
    profiles:
      - prod

  books-service:
    build: ./backend/books-service
    container_name: books_service
    ports:
      - "3001:3001"
    depends_on:
      - postgres
    networks:
      - dit_network
    profiles:
      - dev
      - prod

  users-service:
    build: ./backend/users-service
    container_name: users_service
    ports:
      - "3002:3002"
    depends_on:
      - postgres
    networks:
      - dit_network
    profiles:
      - dev
      - prod

  loans-service:
    build: ./backend/loans-service
    container_name: loans_service
    ports:
      - "3003:3003"
    depends_on:
      - postgres
    networks:
      - dit_network
    profiles:
      - dev
      - prod

  recommendation-service:
    build: ./backend/recommendation-service-python
    container_name: recommendation_service
    ports:
      - "3004:3004"
    depends_on:
      - postgres
    volumes:
      - model_data:/app/models
      - training_data:/app/data
    networks:
      - dit_network
    profiles:
      - dev
      - prod

volumes:
  postgres_data:
  model_data:
  training_data:

networks:
  dit_network:
    driver: bridge