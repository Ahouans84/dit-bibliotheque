version: "3.8"

networks:
  dit-network:
    driver: bridge

volumes:
  postgres-data:
  model-data:
  training-data:

services:

  # Base de données PostgreSQL
  db:
    image: postgres:17
    container_name: postgres-server
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: db_dit
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - dit-network
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d db_dit"]
      interval: 10s
      timeout: 5s
      retries: 5

  # pgAdmin — Interface d'administration PostgreSQL
  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@gmail.com
      PGADMIN_DEFAULT_PASSWORD: admin1234
    ports:
      - "8080:80"
    networks:
      - dit-network
    depends_on:
      - db

  # Service Livres — Node.js / Express
  books-service:
    build: ./backend/books-service
    container_name: books-service
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://admin:admin123@postgres-server:5432/db_dit
      PORT: 3001
    ports:
      - "3001:3001"
    networks:
      - dit-network
    depends_on:
      db:
        condition: service_healthy

  # Service Utilisateurs — Node.js / Express
  users-service:
    build: ./backend/users-service
    container_name: users-service
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://admin:admin123@postgres-server:5432/db_dit
      PORT: 3002
    ports:
      - "3002:3002"
    networks:
      - dit-network
    depends_on:
      db:
        condition: service_healthy

  # Service Emprunts — Node.js / Express
  loans-service:
    build: ./backend/loans-service
    container_name: loans-service
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://admin:admin123@postgres-server:5432/db_dit
      BOOKS_SERVICE_URL: http://books-service:3001
      USERS_SERVICE_URL: http://users-service:3002
      PORT: 3003
    ports:
      - "3003:3003"
    networks:
      - dit-network
    depends_on:
      db:
        condition: service_healthy
      books-service:
        condition: service_started
      users-service:
        condition: service_started

  # Service Recommandation — FastAPI / Python (ML)
  recommendation-service:
    build: ./backend/recommendation-service-python
    container_name: recommendation-service
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://admin:admin123@postgres-server:5432/db_dit
      LOANS_SERVICE_URL: http://loans-service:3003
    volumes:
      - model-data:/app/models
      - training-data:/app/data
    ports:
      - "3004:3004"
    networks:
      - dit-network
    depends_on:
      db:
        condition: service_healthy
      loans-service:
        condition: service_started

  # Frontend
  frontend:
    build: ./frontend
    container_name: frontend
    restart: unless-stopped
    environment:
      REACT_APP_BOOKS_URL: http://localhost:3001
      REACT_APP_USERS_URL: http://localhost:3002
      REACT_APP_LOANS_URL: http://localhost:3003
      REACT_APP_RECO_URL: http://localhost:3004
    ports:
      - "3000:80"
    networks:
      - dit-network
    depends_on:
      - books-service
      - users-service
      - loans-service
      - recommendation-service